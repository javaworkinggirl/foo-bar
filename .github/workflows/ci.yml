name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write       # needed to push to GHCR
      checks: write         # needed to publish test results
      pull-requests: read   # needed by publish-unit-test-result-action to link results to PRs

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up Java 21 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # ── 3. Cache ───────────────────────────────────────────────────────────
      # Caches ~/.m2/repository across runs keyed by pom.xml contents.
      # target/ is NOT cached — always built clean.
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 4. Build + Test ────────────────────────────────────────────────────
      # Maven resolves modules in dependency order:
      #   1. common  (built first, installed to ~/.m2 local repo)
      #   2. foo     (depends on common — resolved from local repo)
      #   3. bar     (depends on common — resolved from local repo)
      #
      # S3_BUCKET_NAME and AWS credentials are stored as GitHub Actions secrets.
      # AWS_REGION defaults to us-east-1 in application.yml; override here if needed.
      - name: Build and test all modules
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          # --threads 2 enables parallel module builds.
          # Maven respects the reactor dependency graph:
          #
          #   Thread 1: common → foo → carnival → integration-test
          #   Thread 2: common → bar → (idle: waits for carnival) → integration-test
          #
          # bar is shorter than foo+carnival so it free-rides alongside them.
          # integration-test waits for both carnival and bar before starting.
          # foo and bar ITs run on separate threads with isolated S3Mock containers
          # on random host ports — no shared state, no collision.
          mvn --batch-mode --no-transfer-progress --threads 2 verify

      # ── 5. Test Results ────────────────────────────────────────────────────
      # Surefire writes XML to each module's target/surefire-reports/.
      # This step collects all of them and renders them in the GitHub UI.
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/target/surefire-reports/*.xml

      # ── 6. Upload JARs as artifacts ────────────────────────────────────────
      # The fat JARs produced by spring-boot:repackage live in each module's
      # target/. We surface them here so they're downloadable from the UI.
      # common is excluded — it's a library JAR, not a deployable artifact.
      - name: Upload foo JAR
        uses: actions/upload-artifact@v4
        with:
          name: foo-jar
          path: foo/target/foo-*.jar
          if-no-files-found: error

      - name: Upload bar JAR
        uses: actions/upload-artifact@v4
        with:
          name: bar-jar
          path: bar/target/bar-*.jar
          if-no-files-found: error

      # ── 7. Docker login ────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Build + push Docker images ─────────────────────────────────────
      # spring-boot:build-image uses Buildpacks (no Dockerfile needed).
      # The image name comes from each module's pom.xml <image><name>.
      # We run per-module so failures are isolated and logs are readable.
      # Install common to ~/.m2 so the build-image steps can resolve it as a
      # dependency. mvn verify (above) only populates target/ — not the local repo.
      - name: Install common to local Maven repo
        run: mvn --batch-mode install -pl common -DskipTests

      - name: Build and push foo image
        run: |
          mvn --batch-mode spring-boot:build-image \
            --projects foo \
            -DskipTests
          docker push ghcr.io/example/foo:1.0.0-SNAPSHOT

      - name: Build and push bar image
        run: |
          mvn --batch-mode spring-boot:build-image \
            --projects bar \
            -DskipTests
          docker push ghcr.io/example/bar:1.0.0-SNAPSHOT
