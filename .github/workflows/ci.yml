name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write       # needed to push to GHCR
      checks: write         # needed to publish test results
      pull-requests: read   # needed by publish-unit-test-result-action to link results to PRs

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java + Maven cache ──────────────────────────────────────────────
      # setup-java's built-in Maven cache handles ~/.m2/repository automatically,
      # keyed on **/pom.xml — no separate cache step needed.
      - name: Set up Java 21 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      # ── 3. Build + Test ────────────────────────────────────────────────────
      # install (not verify) so all modules land in ~/.m2. The build-image steps
      # below need common resolvable as a local artifact without a separate step.
      #
      # --threads 2 runs the reactor in parallel:
      #   Thread 1: common → foo → carnival → integration-test
      #   Thread 2: common → bar → (waits for carnival) → integration-test
      #
      # S3_BUCKET_NAME and AWS credentials are stored as GitHub Actions secrets.
      - name: Build, test, and install all modules
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: mvn --batch-mode --no-transfer-progress --threads 2 install

      # ── 4. Test Results ────────────────────────────────────────────────────
      # Surefire (unit tests) → surefire-reports/
      # Failsafe (integration tests) → failsafe-reports/
      # Collect both so all results appear in the GitHub UI.
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml

      # ── 5. Upload JARs as artifacts ────────────────────────────────────────
      # Upload only the exec (fat) JARs — the thin JARs are library artifacts,
      # not deployables. common is excluded for the same reason.
      - name: Upload foo JAR
        uses: actions/upload-artifact@v4
        with:
          name: foo-jar
          path: foo/target/foo-*-exec.jar
          if-no-files-found: error

      - name: Upload bar JAR
        uses: actions/upload-artifact@v4
        with:
          name: bar-jar
          path: bar/target/bar-*-exec.jar
          if-no-files-found: error

      # ── 6. Docker login ────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Build + push Docker images ─────────────────────────────────────
      # spring-boot:build-image uses Buildpacks (no Dockerfile needed).
      # Image names come from <image><name> in each module's pom.xml.
      # common is already in ~/.m2 from the install step above.
      - name: Build and push foo image
        run: |
          mvn --batch-mode --no-transfer-progress spring-boot:build-image \
            --projects foo \
            -DskipTests
          docker push ghcr.io/example/foo:1.0.0-SNAPSHOT

      - name: Build and push bar image
        run: |
          mvn --batch-mode --no-transfer-progress spring-boot:build-image \
            --projects bar \
            -DskipTests
          docker push ghcr.io/example/bar:1.0.0-SNAPSHOT
