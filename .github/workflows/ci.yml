name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write       # needed to push to GHCR
      checks: write         # needed to publish test results
      pull-requests: read   # needed by publish-unit-test-result-action to link results to PRs

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java + Maven cache ──────────────────────────────────────────────
      # setup-java's built-in Maven cache handles ~/.m2/repository automatically,
      # keyed on **/pom.xml — no separate cache step needed.
      - name: Set up Java 21 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      # ── 3. Build + Test ────────────────────────────────────────────────────
      # install (not verify) so all modules land in ~/.m2. The build-image steps
      # below need common resolvable as a local artifact without a separate step.
      #
      # --threads 2 runs the reactor in parallel:
      #   Thread 1: common → foo → carnival → integration-test
      #   Thread 2: common → bar → (waits for carnival) → integration-test
      #
      # S3_BUCKET_NAME and AWS credentials are stored as GitHub Actions secrets.
      - name: Parallel Maven verify — compile, unit tests, integration tests (2 threads, output logged)
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          echo "=== Parallel Maven verify: compile + unit tests + integration tests (2 threads) ==="
          mkdir -p target
          mvn --batch-mode --no-transfer-progress --threads 2 verify -l target/maven-output.log

      - name: Upload Maven build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maven-build-log
          path: target/maven-output.log
          if-no-files-found: warn

      # ── 4. Test Results ────────────────────────────────────────────────────
      # Surefire (unit tests) → surefire-reports/
      # Failsafe (integration tests) → failsafe-reports/
      # Collect both so all results appear in the GitHub UI.
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/TEST-*.xml
